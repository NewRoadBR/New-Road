<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme.js"></script>
    <title>New Road | Login</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/dark-theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="login-page">

    <div class="container" id="container">

        <div id="container-left">
            <a href="index.html" class="btn-voltar">Voltar</a>
        
            <div class="left-content">
                <h1>Bem-vindo de volta</h1>
                <p>Entre com suas credenciais para acessar o sistema</p>
            </div>
        </div>

        <div class="container-right" id="container-right">

            <div class="titulo" id="titulo">
                <h1>Realize o Login</h1>
                <p>Preencha os dados abaixo para começar</p>
            </div>


            <div class="inputs" id="inputs">
                <label for="input_email">E-mail</label>
                <div class="icone-input">
                    <i class="fa fa-envelope"></i>
                    <input type="email" placeholder="fulano@sptech.school" id="input_email">
                </div>
            </div>

            <div class="inputs" id="inputs">
                <label for="input_senha">Senha</label>
                <div class="icone-input">
                    <i class="fa fa-lock"></i>
                    <input type="password" placeholder="••••••••" id="input_senha">
                </div>
            </div>


            <button onclick="entrar()">Entrar</button>

            <p>Ainda não tem uma conta? <a href="cadastro.html">Entre em contato Conosco</a></p>



        </div>

    </div>

</body>

</html>

<script>


   function entrar() {

    const emailVar = document.getElementById("input_email").value.trim();
    const senhaVar = document.getElementById("input_senha").value;

    if (!emailVar || !senhaVar) {
        alert("Preencha todos os campos!");
        return false;
    }

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVar)) {
        alert("Informe um e-mail válido!");
        return false;
    }

    fetch("/usuarios/autenticar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            emailServer: emailVar,
            senhaServer: senhaVar
        })
    })
    .then(async resposta => {
        const text = await resposta.text();
        let json;

        try {
            json = JSON.parse(text);
        } catch {
            json = null;
        }

        if (!resposta.ok) {
            const message = json?.erro || text || "Email ou senha inválidos";
            throw new Error(message);
        }

        if (!json || json.length === 0) {
            throw new Error("USUARIO_NAO_ENCONTRADO");
        }

        return json;
    })
    .then(json => {
        sessionStorage.EMAIL_USUARIO = json.email;
        sessionStorage.NOME_USUARIO = json.nome;
        sessionStorage.ID_USUARIO = json.id;
        sessionStorage.PERFIL_USUARIO = json.perfil || 'Usuário Padrão';
        sessionStorage.ROLE_USUARIO = json.role || json.perfil || '';
        sessionStorage.AVATAR_USUARIO = json.avatar || '';
        sessionStorage.EMPRESA_ID_USUARIO = json.empresaId || '';

        fetch('/preferencias/' + json.id)
            .then(function (res) { return res.ok ? res.json() : null; })
            .then(function (prefs) {
                if (prefs && window.NewRoadTheme) {
                    NewRoadTheme.apply(Boolean(prefs.darkMode));
                }
                window.location = "./dashboard/index.html";
            })
            .catch(function () {
                window.location = "./dashboard/index.html";
            });
    })
    .catch(erro => {
        if (erro.message === "USUARIO_NAO_ENCONTRADO") {
            alert("Usuário não encontrado!");
        } else {
            alert(erro.message || "Email ou senha inválidos!");
        }
    });

    return false;
}
</script>
