<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="container" id="container">

        <div class="container-left" id="container-left">

            <h1>Bem-vindo de volta</h1>
            <p>Entre com suas credenciais para acessar o sistema</p>

        </div>

        <div class="container-right" id="container-right">

            <div class="titulo" id="titulo">
                <h1>Realize o Login</h1>
                <p>Preencha os dados abaixo para começar</p>
            </div>


            <div class="inputs" id="inputs">
                <label for="input_email">E-mail</label>
                <div class="icone-input">
                    <i class="fa fa-envelope"></i>
                    <input type="email" placeholder="fulano@sptech.school" id="input_email">
                </div>
            </div>

            <div class="inputs" id="inputs">
                <label for="input_senha">Senha</label>
                <div class="icone-input">
                    <i class="fa fa-lock"></i>
                    <input type="password" placeholder="••••••••" id="input_senha">
                </div>
            </div>


            <button onclick="logar()">Entrar</button>

            <p>Ainda não tem uma conta? <a href="">Cadastre-se gratuitamente</a></p>



        </div>

    </div>

</body>

</html>

<script>


    function entrar() {
        aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
