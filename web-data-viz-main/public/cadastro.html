<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>New Road | Cadastro</title>

  <script src="./js/sessao.js"></script>
  <link rel="stylesheet" href="css/cadastro.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body onload="listar()">

  <button onclick="animar()" id="btn-menu">
    <span class="linha"></span>
    <span class="linha"></span>
    <span class="linha"></span>
  </button>

  <nav id="menu-mobile">
    <a href="index.html">Home</a>
  </nav>

  <div class="container" id="container">

    <div class="container-left" id="container-left">

      <h1>Faça parte da New Road</h1>
      <p>Entre com suas credenciais para acessar o sistema</p>

    </div>

    <div class="container-right" id="container-right">

      <div class="titulo" id="titulo">
        <h1>Criar conta</h1>
        <p>Preencha os dados abaixo para começar</p>
      </div>

      <div class="inputs" id="inputs">
        <label for="input_senha">Nome completo</label>
        <div class="icone-input">
          <i class="fa fa-user"></i>
          <input type="text" placeholder="Seu nome completo" id="input_senha">
        </div>
      </div>


      <div class="inputs" id="inputs">
        <label for="input_nomeCompleto">E-mail</label>
        <div class="icone-input">
          <i class="fa fa-envelope"></i>
          <input type="text" placeholder="fulano@sptech.school" id="input_nomeCompleto">
        </div>
      </div>

      <div class="inputs" id="inputs">
        <label for="input_senha">Senha</label>
        <div class="icone-input">
          <i class="fa fa-lock"></i>
          <input type="password" placeholder="Mínimo 8 caracteres" id="input_senha">
        </div>
      </div>

      <div class="inputs" id="inputs">
        <label for="input_confirmarSenha">Confirmar senha</label>
        <div class="icone-input">
          <i class="fa fa-lock"></i>
          <input type="password" placeholder="Digite a senha novamente" id="input_confirmarSenha">
        </div>
      </div>


      <button onclick="logar()">Criar conta</button>

      <p id="ja-tem-uma-conta">Já tem uma conta? <a href="login.html">Faça login</a></p>



    </div>

  </div>







</body>

</html>

<script>

  function sumirMensagem() {
    cardErro.style.display = "none";
  }

  function animar() {
    const btn = document.getElementById("btn-menu");
    const menu = document.getElementById("menu-mobile");

    btn.classList.toggle("ativar");
    menu.classList.toggle("abrir");
  }





  // Array para armazenar empresas cadastradas para validação de código de ativação 
  let listaEmpresasCadastradas = [];

  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var codigoVar = codigo_input.value;
    var idEmpresaVincular

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == "" ||
      codigoVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    // Verificando se o código de ativação é de alguma empresa cadastrada
    for (let i = 0; i < listaEmpresasCadastradas.length; i++) {
      if (listaEmpresasCadastradas[i].codigo_ativacao == codigoVar) {
        idEmpresaVincular = listaEmpresasCadastradas[i].id
        console.log("Código de ativação válido.");
        break;
      } else {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(Mensagem de erro para código inválido)";
        finalizarAguardar();
      }
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        idEmpresaVincularServer: idEmpresaVincular
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  // Listando empresas cadastradas 
  function listar() {
    fetch("/empresas/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            listaEmpresasCadastradas.push(empresa);

            console.log("listaEmpresasCadastradas")
            console.log(listaEmpresasCadastradas[0].codigo_ativacao)
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
