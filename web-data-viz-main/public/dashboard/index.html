<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>NewRoad Dashboard</title>

    <link rel="stylesheet" href="../css/dashboards.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <div class="dashboard-container">

        <header class="topbar">

            <div>

                <h1>
                    Dashboard Operacional
                </h1>

                <p>
                    Monitoramento inteligente rodoviário
                </p>

            </div>

            <select
                id="selectRodovia"
                onchange="trocarRodovia()"
            >

                <option>
                    Rodovia Anhanguera
                </option>

                <option>
                    Rodovia dos Bandeirantes
                </option>

                <option>
                    Rodovia Dom Pedro I
                </option>

                <option>
                    Rodovia Castello Branco
                </option>

                <option>
                    Rodovia Santos Dumont
                </option>

                <option>
                    Sistema Anchieta-Imigrantes
                </option>

            </select>

        </header>

        <section class="kpis-grid">

            <div class="kpi-card">

                <span>
                    Fluxo Médio
                </span>

                <h2 id="kpiFluxo">
                    --
                </h2>

            </div>

            <div class="kpi-card">

                <span>
                    Horário Crítico
                </span>

                <h2 id="kpiHorarioCritico">
                    --
                </h2>

            </div>

            <div class="kpi-card">

                <span>
                    Janela Ideal
                </span>

                <h2 id="kpiJanelaIdeal">
                    --
                </h2>

            </div>

            <div class="kpi-card">

                <span>
                    Melhor Dia
                </span>

                <h2 id="kpiMelhorDia">
                    --
                </h2>

            </div>

            <div class="kpi-card">

                <span>
                    Pressão Operacional
                </span>

                <h2 id="kpiPressaoOperacional">
                    --
                </h2>

            </div>

            <div class="kpi-card">

                <span>
                    Perfil Pesado
                </span>

                <h2 id="kpiPerfilPesado">
                    --
                </h2>

            </div>

        </section>

        <section class="graficos-grid">

            <div class="grafico-card">

                <h3>
                    Fluxo Horário
                </h3>

                <div class="grafico-container">

                    <canvas id="graficoFluxoHorario"></canvas>

                </div>

            </div>

            <div class="grafico-card">

                <h3>
                    Volume por Dia da Semana
                </h3>

                <div class="grafico-container">

                    <canvas id="graficoDiaSemana"></canvas>

                </div>

            </div>

        </section>

        <section class="obras-section">

            <div class="section-header">

                <h2>
                    Obras da Rodovia
                </h2>

            </div>

            <div class="table-container">

                <table class="tabela-obras">

                    <thead>

                        <tr>

                            <th>
                                Título
                            </th>

                            <th>
                                Tipo
                            </th>

                            <th>
                                Status
                            </th>

                            <th>
                                Início
                            </th>

                            <th>
                                Fim
                            </th>

                        </tr>

                    </thead>

                    <tbody id="tbodyObras">

                    </tbody>

                </table>

            </div>

        </section>

    </div>

    <script src="../js/script.js"></script>

</body>

</html>
