# ── Banco de dados MySQL ──────────────────────────────────────
db.url=jdbc:mysql://localhost:3306/newroad_db?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&allowLoadLocalInfile=true
db.usuario=
db.senha=

# ── Configurações do ETL ──────────────────────────────────────
# Tamanho do lote para batch insert
etl.tamanho.lote=5000

# ── Fonte dos arquivos xlsx ───────────────────────────────────
# Valores possíveis: LOCAL | S3
etl.fonte=S3

# ── Configuração para fonte LOCAL ────────────────────────────
# Caminho da pasta que contém os arquivos .xlsx
etl.local.pasta=

# ── Configuração para fonte S3 ────────────────────────────────
# Nome do bucket S3
etl.s3.bucket=meu-bucket-new-road
# Prefixo (pasta) dentro do bucket. Deixe vazio para ler a raiz.
etl.s3.prefixo=meuArquivo/entrada/
# Região AWS (ex: us-east-1, sa-east-1)
etl.s3.regiao=us-east-1
